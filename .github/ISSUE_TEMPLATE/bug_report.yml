name: Bug Report
description: File a bug report to help us improve NeuroLink
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: AI Provider
      description: Which AI provider were you using when the bug occurred?
      options:
        - OpenAI
        - Anthropic
        - Google AI
        - Google Vertex
        - AWS Bedrock
        - Azure OpenAI
        - Hugging Face
        - Ollama
        - Mistral
        - Multiple providers
        - Not applicable
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component of NeuroLink is affected?
      options:
        - CLI
        - SDK
        - MCP Integration
        - Streaming
        - Tool Calling
        - Configuration
        - Authentication
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Please provide detailed steps to reproduce the issue
      placeholder: |
        1. Run command `neurolink ...`
        2. Configure provider with `...`
        3. Execute `...`
        4. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: What environment are you running NeuroLink in?
      value: |
        - OS: 
        - Node.js version: 
        - NeuroLink version: 
        - Package manager: 
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/juspay/neurolink/blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true