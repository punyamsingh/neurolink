<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- OG/Twitter tags managed in +layout.svelte via svelte:head -->
    <meta name="theme-color" content="#016fb9" />
    <meta name="robots" content="index, follow" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <!-- Resource hints -->
    <link rel="dns-prefetch" href="https://docs.neurolink.ink" />
    <link rel="preconnect" href="https://docs.neurolink.ink" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link
      rel="preconnect"
      href="https://cdn.jsdelivr.net"
      crossorigin="anonymous"
    />

    <!-- Google Analytics + Meta Pixel (consent-gated) -->
    <script>
      (function () {
        try {
          if (localStorage.getItem("trackingConsent") !== "granted") return;
        } catch (e) {
          return;
        }

        // Google tag (gtag.js)
        var gs = document.createElement("script");
        gs.async = true;
        gs.src = "https://www.googletagmanager.com/gtag/js?id=G-LVT5YKZZXV";
        document.head.appendChild(gs);
        window.dataLayer = window.dataLayer || [];
        function gtag() {
          dataLayer.push(arguments);
        }
        gtag("js", new Date());
        gtag("config", "G-LVT5YKZZXV");

        // Meta Pixel Code
        !(function (f, b, e, v, n, t, s) {
          if (f.fbq) return;
          n = f.fbq = function () {
            n.callMethod
              ? n.callMethod.apply(n, arguments)
              : n.queue.push(arguments);
          };
          if (!f._fbq) f._fbq = n;
          n.push = n;
          n.loaded = !0;
          n.version = "2.0";
          n.queue = [];
          t = b.createElement(e);
          t.async = !0;
          t.src = v;
          s = b.getElementsByTagName(e)[0];
          s.parentNode.insertBefore(t, s);
        })(
          window,
          document,
          "script",
          "https://connect.facebook.net/en_US/fbevents.js",
        );
        fbq("init", "886334757655006");
        fbq("track", "PageView");
      })();
    </script>

    <title>NeuroLink — The Complete TypeScript AI SDK</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="antialiased">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
